<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BizIntel{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; }
        .sidebar {
            position: fixed; top: 0; left: 0; width: 230px; height: 100vh;
            background: #0f172a; color: #94a3b8; z-index: 1000; overflow-y: auto;
        }
        .sidebar .logo { padding: 1.25rem 1rem; font-size: 1.2rem; font-weight: 700; color: #fff; border-bottom: 1px solid rgba(255,255,255,.08); }
        .sidebar .logo i { color: #3b82f6; margin-right: .5rem; }
        .sidebar nav a {
            display: flex; align-items: center; gap: .75rem; padding: .75rem 1rem;
            color: #94a3b8; text-decoration: none; font-size: .9rem; border-left: 3px solid transparent;
        }
        .sidebar nav a:hover, .sidebar nav a.active { color: #fff; background: rgba(255,255,255,.05); border-left-color: #3b82f6; }
        .sidebar nav a i { font-size: 1.1rem; width: 22px; text-align: center; }
        .main-content { margin-left: 230px; padding: 1.5rem 2rem; min-height: 100vh; }
        .card-stat { border: none; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,.05); }
        .stat-value { font-size: 1.65rem; font-weight: 700; }
        .chart-container { position: relative; height: 290px; width: 100%; }
        .badge-critical { background: #fecaca; color: #991b1b; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        .badge-success { background: #d1fae5; color: #065f46; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><i class="bi bi-graph-up-arrow"></i>BizIntel</div>
        <nav>
            <a href="/" class="{{ 'active' if request.path == '/' }}"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/analytics" class="{{ 'active' if request.path == '/analytics' }}"><i class="bi bi-bar-chart-line"></i> Analytics</a>
            <a href="/predictions" class="{{ 'active' if request.path == '/predictions' }}"><i class="bi bi-cpu"></i> Predictions</a>
            <a href="/insights" class="{{ 'active' if request.path == '/insights' }}">
                <i class="bi bi-lightbulb"></i> Insights
                {% if unread_insights %}<span class="badge bg-danger rounded-pill ms-auto">{{ unread_insights }}</span>{% endif %}
            </a>
            <a href="/data-entry" class="{{ 'active' if request.path == '/data-entry' }}"><i class="bi bi-plus-circle"></i> Data Entry</a>
        </nav>
        <div style="position:absolute;bottom:1rem;left:1rem;right:1rem;font-size:.7rem;color:#475569;">
            <hr style="border-color:rgba(255,255,255,.06);">
            Computing Business Hub
        </div>
    </aside>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showToast(msg, type) {
            type = type || 'success';
            var bg = type === 'error' ? 'bg-danger' : 'bg-success';
            var el = document.createElement('div');
            el.className = 'toast align-items-center text-white ' + bg + ' border-0 position-fixed top-0 end-0 m-3';
            el.setAttribute('role', 'alert');
            el.innerHTML = '<div class="d-flex"><div class="toast-body">' + msg + '</div><button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>';
            document.body.appendChild(el);
            var toast = new bootstrap.Toast(el);
            toast.show();
            setTimeout(function() { el.remove(); }, 5000);
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
